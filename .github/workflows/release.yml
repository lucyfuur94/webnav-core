name: Release

# Publishes @dikshanty94/webnav to npm when a version tag is pushed.
# One-time setup: add an NPM_TOKEN repo secret (npm "Automation" token).
# Cut a release:  npm version patch|minor|major  &&  git push --follow-tags
on:
  push:
    tags: ['v*']

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write          # npm provenance (--provenance) needs OIDC
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org   # overrides any local mirror
          cache: npm
      - run: npm ci

      # Gate: the git tag must match package.json's version, so a tag can never
      # publish a mismatched version. Tag v0.2.0 => package.json must be 0.2.0.
      - name: Verify tag matches package version
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG=${GITHUB_REF_NAME#v}
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag $GITHUB_REF_NAME ($TAG) != package.json version $PKG"
            exit 1
          fi

      - name: Typecheck
        run: npx tsc --noEmit
      - name: Tests
        run: npm test
      # prepack runs the build; --provenance attaches a verifiable build record.
      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
